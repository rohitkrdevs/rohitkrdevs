name: Automated Blog Generation

on:
  schedule:
    # This cron syntax runs the job every day at 2:00 AM UTC (adjust as needed)
    - cron: "0 2 * * *"
  # workflow_dispatch allows you to manually click a "Run" button in GitHub to test it
  workflow_dispatch:

jobs:
  trigger-api:
    runs-on: ubuntu-latest
    steps:
      - name: Hit the Next.js Cron Endpoint
        run: |
          curl -f -X GET "${{ secrets.PROD_URL }}/api/cron?secret=${{ secrets.CRON_SECRET }}"
